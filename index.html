<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPLF Ticket System</title>
  <link rel="icon" href="assets/vplf-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="arena-lights" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="#" aria-label="VPLF Ticket System home" data-show-create>
        <img src="assets/vplf-logo.svg" alt="VPLF Logo" class="brand-logo">
        <span class="brand-copy">
          <strong>VPLF</strong>
          <span>Ticket System</span>
        </span>
      </a>

      <div class="header-actions">
        <span class="database-pill" id="databaseStatus">Connecting</span>
        <button class="panel-button" type="button" data-open-panel>
          <span class="button-icon" aria-hidden="true">DB</span>
          League Panel
        </button>
      </div>
    </header>

    <main class="main-stage">
      <nav class="mode-switch" aria-label="Ticket views">
        <button class="mode-button active" type="button" data-show-create>Create Ticket</button>
        <button class="mode-button" type="button" data-open-panel>League Panel</button>
      </nav>

      <section class="ticket-view active" data-view="create" aria-labelledby="create-title">
        <form class="glass-card ticket-card" id="ticketForm">
          <div class="card-scanline" aria-hidden="true"></div>
          <div class="card-symbol" aria-hidden="true">V</div>
          <p class="eyebrow">VPLF Claim Desk</p>
          <h1 id="create-title">Create a Ticket</h1>
          <p class="subtitle">Submit your reward claim for league staff review.</p>

          <div class="claim-meter" aria-hidden="true">
            <span id="formMeter"></span>
          </div>

          <div class="form-grid">
            <label class="field-group">
              <span class="field-label">
                <span class="field-icon members-icon" aria-hidden="true"></span>
                USERNAME
              </span>
              <input id="username" name="username" type="text" placeholder="Enter your username" autocomplete="username" required>
            </label>

            <label class="field-group">
              <span class="field-label"><span class="field-icon id-icon" aria-hidden="true"></span> IN-GAME ID</span>
              <input id="gameId" name="gameId" type="text" inputmode="numeric" placeholder="Enter your in-game ID" required>
            </label>

            <label class="field-group">
              <span class="field-label"><span class="field-icon boots-icon" aria-hidden="true"></span> ITEM WON</span>
              <select id="itemWon" name="itemWon" required>
                <option value="" selected disabled>Choose an item</option>
                <option>VPLF Boots Blue (Old)</option>
                <option>VPLF Hat Blue (Old)</option>
                <option>VPLF Boots Red</option>
                <option>VPLF Goggles Red</option>
                <option>VPLF Hat Red</option>
                <option>VPLF Mask Red</option>
                <option>VPLF Gloves Red</option>
                <option>VPLF Injury Mask Red</option>
                <option>VPLF Glasses Golden</option>
                <option>VPLF Hood Golden</option>
                <option>VPLF Boots Pink</option>
              </select>
            </label>

            <label class="field-group">
              <span class="field-label"><span class="field-icon chat-icon" aria-hidden="true"></span> DISCORD MESSAGE LINK</span>
              <input id="messageLink" name="messageLink" type="url" placeholder="https://discord.com/channels/..." required>
            </label>

            <label class="field-group">
              <span class="field-label"><span class="field-icon link-icon" aria-hidden="true"></span> SERVER LINK</span>
              <input id="serverLink" name="serverLink" type="url" placeholder="https://discord.gg/..." required>
            </label>

            <label class="field-group">
              <span class="field-label"><span class="field-icon info-icon" aria-hidden="true"></span> ANY ADDITIONAL INFORMATION</span>
              <textarea id="additionalInfo" name="additionalInfo" rows="5" placeholder="Any extra details..."></textarea>
            </label>
          </div>

          <button class="submit-button" type="submit" id="submitButton">
            <span>Submit Claim</span>
          </button>
          <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="ticket-view" data-view="admin" aria-labelledby="panel-title">
        <div class="glass-card admin-card">
          <div class="card-scanline" aria-hidden="true"></div>
          <div class="admin-heading">
            <div>
              <p class="eyebrow">Staff Console</p>
              <h2 id="panel-title">League Panel</h2>
            </div>
            <button class="ghost-button" type="button" id="logoutButton">Logout Admin</button>
          </div>

          <div class="stats-grid" aria-label="Ticket counts">
            <article class="stat-card">
              <span>Pending</span>
              <strong id="pendingCount">0</strong>
            </article>
            <article class="stat-card">
              <span>Approved</span>
              <strong id="approvedCount">0</strong>
            </article>
            <article class="stat-card">
              <span>Total</span>
              <strong id="ticketCount">0</strong>
            </article>
          </div>

          <div class="admin-toolbar">
            <label class="search-box">
              <span class="sr-only">Search tickets</span>
              <input id="ticketSearch" type="search" placeholder="Search username, ID, item, code">
            </label>

            <label class="filter-box">
              <span class="sr-only">Filter tickets</span>
              <select id="statusFilter">
                <option value="all">All Tickets</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
              </select>
            </label>

            <button class="ghost-button" type="button" id="refreshTickets">Refresh</button>
            <button class="ghost-button" type="button" id="exportTickets">Export CSV</button>
          </div>

          <div class="tickets-list" id="ticketsList"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Virtual Premier League Football</span>
    </footer>
  </div>

  <div class="modal-backdrop" id="loginModal" hidden>
    <form class="login-panel" id="loginForm">
      <button class="close-button" type="button" id="closeLogin" aria-label="Close login">x</button>
      <div class="card-symbol small" aria-hidden="true">V</div>
      <h2>Admin Access</h2>
      <label class="field-group">
        <span class="field-label">PASSWORD</span>
        <input class="sr-only" type="text" name="adminUser" value="admin" autocomplete="username" tabindex="-1" aria-hidden="true">
        <input id="adminPassword" name="adminPassword" type="password" placeholder="Enter panel password" autocomplete="current-password" required>
      </label>
      <button class="submit-button" type="submit" id="loginButton">
        <span>Unlock Panel</span>
      </button>
      <p class="form-message" id="loginMessage" role="status" aria-live="polite"></p>
    </form>
  </div>

  <template id="ticketTemplate">
    <article class="ticket-request">
      <div class="ticket-main">
        <div class="ticket-topline">
          <div>
            <span class="ticket-code" data-ticket-code></span>
            <h3 data-ticket-username></h3>
          </div>
          <span class="status-pill" data-ticket-status></span>
        </div>
        <dl class="ticket-details">
          <div>
            <dt>Item</dt>
            <dd data-ticket-item></dd>
          </div>
          <div>
            <dt>ID</dt>
            <dd data-ticket-id></dd>
          </div>
          <div>
            <dt>Message Link</dt>
            <dd><a data-ticket-message target="_blank" rel="noopener noreferrer">View Link</a></dd>
          </div>
          <div>
            <dt>Server Link</dt>
            <dd><a data-ticket-server target="_blank" rel="noopener noreferrer">View Link</a></dd>
          </div>
          <div>
            <dt>Info</dt>
            <dd data-ticket-info></dd>
          </div>
          <div>
            <dt>Date</dt>
            <dd data-ticket-date></dd>
          </div>
        </dl>
      </div>
      <div class="ticket-actions">
        <button class="copy-button" type="button" data-copy-ticket>Copy ID</button>
        <button class="approve-button" type="button" data-approve-ticket>Approve</button>
        <button class="deny-button" type="button" data-deny-ticket>Deny</button>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
